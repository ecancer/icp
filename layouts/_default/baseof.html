<!DOCTYPE html>
<html lang="en-GB">
<head>
  {{ partial "head.html" . }}
  {{/* Run before CSS paints to avoid flash of wrong theme */}}
  <script>
    (function() {
      var stored = localStorage.getItem('icp-theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var isDark = stored ? stored === 'dark' : prefersDark;
      if (isDark) document.documentElement.classList.add('dark');
      document.documentElement.classList.add('theme-loaded');
    })();
  </script>
</head>
<body>
<div class="site">
  {{ partial "nav.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "cta-band.html" . }}
  {{ partial "footer.html" . }}
</div>
</body>
</html>
